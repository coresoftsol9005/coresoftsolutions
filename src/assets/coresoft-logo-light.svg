<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 560 160"
  width="560"
  height="160"
  role="img"
  aria-label="CoreSoft Solutions logo">

  <title>CoreSoft Solutions</title>
  <desc>CoreSoft Solutions — Signal Node logo. Digital Media and Business Audits.</desc>

  <!-- ═══════════════════════════════════════════
       CORESOFT SOLUTIONS · SIGNAL NODE LOGO
       Version: 1.0  |  Format: SVG (vector)
       Colors: #E53935 (Signal Red) · #0D47A1 (Deep Navy) · #FFFFFF (White)
       Safe zone: 16px padding on all sides recommended
  ════════════════════════════════════════════ -->

  <!-- ── ICON: Signal Node ── -->
  <!-- Connector lines -->
  <line x1="60" y1="80" x2="96" y2="52"  stroke="#0D47A1" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="60" y1="80" x2="96" y2="108" stroke="#0D47A1" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Satellite nodes (navy) -->
  <circle cx="112" cy="40"  r="17" fill="#0D47A1"/>
  <circle cx="112" cy="120" r="17" fill="#0D47A1"/>

  <!-- Central node (signal red) -->
  <circle cx="48" cy="80" r="32" fill="#E53935"/>

  <!-- ── WORDMARK ── -->
  <!-- "CoreSoft" — Extra Bold, Deep Navy -->
  <text
    x="158"
    y="74"
    font-family="'Helvetica Neue', 'Arial Black', Helvetica, Arial, sans-serif"
    font-size="50"
    font-weight="900"
    fill="#0D47A1"
    letter-spacing="-1.5">CoreSoft</text>

  <!-- Red rule separator -->
  <rect x="158" y="82" width="330" height="3" rx="1.5" fill="#E53935"/>

  <!-- "SOLUTIONS" — Light weight, navy -->
  <text
    x="160"
    y="118"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="30"
    font-weight="300"
    fill="#0D47A1"
    letter-spacing="7">SOLUTIONS</text>

  <!-- Tagline -->
  <text
    x="161"
    y="144"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="11"
    font-weight="300"
    fill="#888888"
    letter-spacing="2.5">DIGITAL MEDIA  ·  BUSINESS AUDITS</text>

</svg>
