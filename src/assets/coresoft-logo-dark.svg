<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 560 160"
  width="560"
  height="160"
  role="img"
  aria-label="CoreSoft Solutions logo — dark variant">

  <title>CoreSoft Solutions (Dark)</title>
  <desc>CoreSoft Solutions — Signal Node logo, dark background variant.</desc>

  <!-- ═══════════════════════════════════════════
       CORESOFT SOLUTIONS · SIGNAL NODE LOGO
       Variant: Dark Background
       Version: 1.0  |  Format: SVG (vector)
       Colors: #E53935 (Signal Red) · #FFFFFF (White) · #90CAF9 (Light Blue)
  ════════════════════════════════════════════ -->

  <!-- Dark background -->
  <rect width="560" height="160" fill="#0A1628" rx="0"/>

  <!-- ── ICON: Signal Node ── -->
  <line x1="60" y1="80" x2="96" y2="52"  stroke="#90CAF9" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="60" y1="80" x2="96" y2="108" stroke="#90CAF9" stroke-width="3.5" stroke-linecap="round"/>

  <circle cx="112" cy="40"  r="17" fill="#1565C0"/>
  <circle cx="112" cy="120" r="17" fill="#1565C0"/>
  <circle cx="48"  cy="80"  r="32" fill="#E53935"/>

  <!-- ── WORDMARK ── -->
  <text
    x="158"
    y="74"
    font-family="'Helvetica Neue', 'Arial Black', Helvetica, Arial, sans-serif"
    font-size="50"
    font-weight="900"
    fill="#FFFFFF"
    letter-spacing="-1.5">CoreSoft</text>

  <rect x="158" y="82" width="330" height="3" rx="1.5" fill="#E53935"/>

  <text
    x="160"
    y="118"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="30"
    font-weight="300"
    fill="#90CAF9"
    letter-spacing="7">SOLUTIONS</text>

  <text
    x="161"
    y="144"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="11"
    font-weight="300"
    fill="#546E8A"
    letter-spacing="2.5">DIGITAL MEDIA  ·  BUSINESS AUDITS</text>

</svg>
